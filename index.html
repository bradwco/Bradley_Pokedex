<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pokedex">
    <!--Left Side-->
    <div class="pokedexLeft"> 
      <!-- Top decorations pieces-->
      <div class="topBar">
        <div class = "lens"> </div>
        <div class="indicatorLights">
          <span class="light red"></span>
          <span class="light yellow"></span>
          <span class="light green"></span>
        </div>
      </div>

      <div class = "screenBorder">
        <div class = "leftScreen">
          <input type="text" id="searchInput" placeholder="Search Pokemon..." oninput="filterPokemon()">
          <div id="typeFilters">
            <button onclick="setType(null)">All</button>
            <button onclick="setType('Normal')">Normal</button>
            <button onclick="setType('Fire')">Fire</button>
            <button onclick="setType('Water')">Water</button>
            <button onclick="setType('Grass')">Grass</button>
            <button onclick="setType('Electric')">Electric</button>
            <button onclick="setType('Ice')">Ice</button>
            <button onclick="setType('Fighting')">Fighting</button>
            <button onclick="setType('Poison')">Poison</button>
            <button onclick="setType('Ground')">Ground</button>
            <button onclick="setType('Flying')">Flying</button>
            <button onclick="setType('Psychic')">Psychic</button>
            <button onclick="setType('Bug')">Bug</button>
            <button onclick="setType('Rock')">Rock</button>
            <button onclick="setType('Ghost')">Ghost</button>
            <button onclick="setType('Dragon')">Dragon</button>
          </div>
          <div id="pokemonGrid"></div>
        </div>
      </div>
        <!--Bottom decorative pieces-->
        <div class="dpad">
          <div class="dpad-up"></div>
          <div class="dpad-right"></div>
          <div class="dpad-down"></div>
          <div class="dpad-left"></div>
          <div class="dpad-center"></div>
        </div>
    </div>

    <!--Middle Hinge-->
    <div class="hinge"> 
      <div class="hinge-line"></div>
      <div class="hinge-line"></div>
      <div class="hinge-line"></div>
    </div>

    <!--Right Side-->
    <div class="pokedexRight"> 
      <div class="tabBar">
        <button class="active" data-tab="pokemon" onclick="switchTab('pokemon')">POKEMON</button>
        <button data-tab="trainer" onclick="switchTab('trainer')">TRAINER</button>
      </div>

      <div class="screenBorder">
        <div class="rightScreen">
          <div class="tabContent active" id="pokemonTab">
            <div class ="detailEmpty">
              <p>Select a Pokemon from the catalog</p>
            </div>
            <div class="detailView" id="detailView">
              <img class="detailSprite" id="detailSprite" src="" alt="">
              <div class="detailNum" id="detailNum"></div>
              <div class="detailName" id="detailName"></div>
              <div class="detailTypes" id="detailTypes"></div>
              <div class="statBars" id="statBars"></div>
            </div>
          </div>
          <div class="tabContent" id="trainerTab">
            <div class="trainerCard">
              <div class="trainerAvatar">BC</div>
              <div class="trainerName">BRADLEY</div>
              <div class="trainerBio">
                UCLA Statistics & Data Science, Class of 2027. Former AI/ML intern at Newegg. Built things that move, think, and occasionally break.
              </div>
              <div class="trainerBadges">
                <span class="badge">Web</span>
                <span class="badge">ML</span>
                <span class="badge">Data</span>
                <span class="badge">Hardware</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div> <!--Ending tag of main Pokedex div-->
  <script src="scripts.js"></script>
</body>
</html>
